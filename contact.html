<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact ProteinCalc</title>
<meta name="description" content="Get in touch with the ProteinCalc team for questions, feedback, or partnership inquiries.">
<link rel="canonical" href="https://YOUR-SITE-URL/contact.html">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" stroke="#175E8C" stroke-width="2"/><circle cx="14" cy="16" r="3.4" fill="#1FA97E"/><circle cx="26" cy="16" r="3.4" fill="#175E8C"/><circle cx="20" cy="26" r="3.4" fill="#1FA97E"/><path d="M14 16L20 26M26 16L20 26" stroke="#175E8C" stroke-width="1.6"/></svg>
      ProteinCalc
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="calculators.html">All Calculators</a>
      <a href="blog.html">Blog</a>
      <a href="faq.html">FAQ</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle dark mode"></button>
      <button class="nav-burger" aria-label="Open menu" aria-expanded="false">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</header>

<section class="page-hero container">
  <div class="breadcrumb"><a href="index.html">Home</a> / Contact</div>
  <h1 style="font-size:clamp(28px,4vw,44px);">Get in touch</h1>
  <p class="section-lead">Questions, feedback, or partnership inquiries — we read every message.</p>
</section>

<section class="section-tight">
  <div class="container" style="max-width:560px;">
    <form class="glass calc-card" onsubmit="event.preventDefault(); document.getElementById('formOk').style.display='block'; this.reset();">
      <div class="field-row single">
        <div class="field"><label for="cname">Name</label><input type="text" id="cname" required></div>
      </div>
      <div class="field-row single">
        <div class="field"><label for="cemail">Email</label><input type="email" id="cemail" required></div>
      </div>
      <div class="field-row single">
        <div class="field">
          <label for="cmsg">Message</label>
          <textarea id="cmsg" rows="5" required style="width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);font-family:inherit;font-size:15px;"></textarea>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send message</button>
      <p id="formOk" style="display:none;color:var(--green-700);font-size:14px;margin-top:14px;">Thanks — your message has been noted. We'll get back to you soon.</p>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 ProteinCalc. All rights reserved.</span>
      <span><a href="legal.html">Privacy &amp; Disclaimer</a></span>
    </div>
  </div>
</footer>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const burger = document.querySelector('.nav-burger');
  const links = document.querySelector('.nav-links');
  if (burger && links) burger.addEventListener('click', () => links.classList.toggle('open'));
  const toggle = document.querySelector('.theme-toggle');
  const root = document.documentElement;
  function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
  function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
  if (lsGet('pc-theme') === 'dark') root.setAttribute('data-theme', 'dark');
  function updateIcon(){
    const isDark = root.getAttribute('data-theme') === 'dark';
    toggle.innerHTML = isDark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
  }
  if (toggle) { updateIcon(); toggle.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    if (isDark) { root.removeAttribute('data-theme'); lsSet('pc-theme','light'); }
    else { root.setAttribute('data-theme','dark'); lsSet('pc-theme','dark'); }
    updateIcon();
  }); }
});
</script>
</body>
</html>
