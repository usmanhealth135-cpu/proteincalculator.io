<section class="section-tight">
  <div class="container">
    <div class="calc-tabs" id="calcTabs" style="margin-bottom:28px;flex-wrap:wrap;">
      <button class="calc-tab active" data-target="bmi">BMI</button>
      <button class="calc-tab" data-target="bmr">BMR</button>
      <button class="calc-tab" data-target="tdee">TDEE</button>
      <button class="calc-tab" data-target="lbm">Lean Body Mass</button>
      <button class="calc-tab" data-target="ideal">Ideal Weight</button>
      <button class="calc-tab" data-target="water">Water Intake</button>
      <button class="calc-tab" data-target="calorie">Calorie</button>
    </div>

    <div class="glass calc-card" style="max-width:640px;">
      <div class="calc-tabs">
        <div class="seg" style="flex:1">
          <button type="button" class="unit-btn active" data-unit="metric">Metric (kg/cm)</button>
          <button type="button" class="unit-btn" data-unit="imperial">Imperial (lb/ft)</button>
        </div>
      </div>

      <form id="calcForm" novalidate>
        <div class="field-row">
          <div class="field">
            <label>Gender</label>
            <div class="pill-group" id="genderGroup">
              <button type="button" class="pill active" data-value="male">Male</button>
              <button type="button" class="pill" data-value="female">Female</button>
            </div>
          </div>
          <div class="field"><label for="age">Age</label><input type="number" id="age" min="14" max="90" value="28"></div>
        </div>
        <div class="field-row" id="metricRow">
          <div class="field"><label for="heightCm">Height (cm)</label><input type="number" id="heightCm" min="120" max="230" value="175"></div>
          <div class="field"><label for="weightKg">Weight (kg)</label><input type="number" id="weightKg" min="30" max="250" value="75"></div>
        </div>
        <div class="field-row" id="imperialRow" style="display:none;">
          <div class="field"><label for="heightFt">Height (ft)</label><input type="number" id="heightFt" min="3" max="7" value="5"></div>
          <div class="field"><label for="heightIn">Height (in)</label><input type="number" id="heightIn" min="0" max="11" value="9"></div>
        </div>
        <div class="field-row single" id="imperialWeightRow" style="display:none;">
          <div class="field"><label for="weightLb">Weight (lb)</label><input type="number" id="weightLb" min="60" max="550" value="165"></div>
        </div>
        <div class="field-row single">
          <div class="field">
            <label for="activity">Activity level</label>
            <select id="activity">
              <option value="sedentary">Sedentary</option>
              <option value="light">Light (1-3x/week)</option>
              <option value="moderate" selected>Moderate (3-5x/week)</option>
              <option value="active">Active (6-7x/week)</option>
              <option value="athlete">Athlete (2x/day)</option>
            </select>
          </div>
        </div>
        <div class="field-row single" id="calorieGoalRow" style="display:none;">
          <div class="field">
            <label>Goal</label>
            <div class="pill-group" id="calorieGoalGroup">
              <button type="button" class="pill" data-value="lose">Lose weight</button>
              <button type="button" class="pill active" data-value="maintain">Maintain</button>
              <button type="button" class="pill" data-value="gain">Gain weight</button>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:6px;">Calculate</button>
      </form>

      <div class="calc-result" id="calcResult"></div>
    </div>
  </div>
</section>

<script>
const CONV = {
  lbToKg: lb => lb * 0.453592, kgToLb: kg => kg / 0.453592,
  inToCm: inch => inch * 2.54, cmToIn: cm => cm / 2.54,
  ftInToCm: (ft, inch) => (ft * 12 + Number(inch || 0)) * 2.54,
};
function round1(n){ return Math.round(n * 10) / 10; }
function round0(n){ return Math.round(n); }
const ACTIVITY_FACTORS = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, athlete: 1.9 };
function calcBMR({ gender, weightKg, heightCm, age }) {
  const base = 10 * weightKg + 6.25 * heightCm - 5 * age;
  return gender === 'male' ? base + 5 : base - 161;
}
function calcTDEE(bmr, activity) { return bmr * (ACTIVITY_FACTORS[activity] || 1.2); }
function calcLBM({ gender, weightKg, heightCm }) {
  return gender === 'male' ? 0.407*weightKg + 0.267*heightCm - 19.2 : 0.252*weightKg + 0.473*heightCm - 48.3;
}
function calcIdealWeight({ gender, heightCm }) {
  const heightIn = CONV.cmToIn(heightCm);
  const overFive = Math.max(heightIn - 60, 0);
  const base = gender === 'male' ? 50 : 45.5;
  return base + 2.3 * overFive;
}
function calcBMI(weightKg, heightCm) { const h = heightCm/100; return weightKg/(h*h); }
function bmiCategory(bmi) {
  if (bmi < 18.5) return { label: 'Underweight', color: 'var(--blue-500)' };
  if (bmi < 25) return { label: 'Healthy range', color: 'var(--green-500)' };
  if (bmi < 30) return { label: 'Overweight', color: '#E0A62E' };
  return { label: 'Obesity range', color: '#D9603B' };
}
function calcWater({ weightKg, activity }) {
  const base = weightKg * 0.033;
  const bonus = { sedentary:0, light:0.3, moderate:0.5, active:0.7, athlete:1.0 }[activity] || 0;
  return base + bonus;
}

document.addEventListener('DOMContentLoaded', () => {
  const burger = document.querySelector('.nav-burger');
  const links = document.querySelector('.nav-links');
  if (burger && links) burger.addEventListener('click', () => links.classList.toggle('open'));
  const toggle = document.querySelector('.theme-toggle');
  const root = document.documentElement;
  function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
  function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
  if (lsGet('pc-theme') === 'dark') root.setAttribute('data-theme', 'dark');
  function updateIcon(){
    const isDark = root.getAttribute('data-theme') === 'dark';
    toggle.innerHTML = isDark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
  }
  if (toggle) { updateIcon(); toggle.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    if (isDark) { root.removeAttribute('data-theme'); lsSet('pc-theme','light'); }
    else { root.setAttribute('data-theme','dark'); lsSet('pc-theme','dark'); }
    updateIcon();
  }); }

  let unit='metric', gender='male', activeCalc='bmi', calorieGoal='maintain';
  document.querySelectorAll('.calc-tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.calc-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      activeCalc = tab.dataset.target;
      document.getElementById('calorieGoalRow').style.display = activeCalc==='calorie' ? 'block' : 'none';
      const box = document.getElementById('calcResult');
      box.classList.remove('show'); box.innerHTML = '';
    });
  });
  document.querySelectorAll('.unit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); unit=btn.dataset.unit;
      document.getElementById('metricRow').style.display = unit==='metric'?'grid':'none';
      document.getElementById('imperialRow').style.display = unit==='imperial'?'grid':'none';
      document.getElementById('imperialWeightRow').style.display = unit==='imperial'?'grid':'none';
    });
  });
  document.querySelectorAll('#genderGroup .pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{ document.querySelectorAll('#genderGroup .pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); gender=btn.dataset.value; });
  });
  document.querySelectorAll('#calorieGoalGroup .pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{ document.querySelectorAll('#calorieGoalGroup .pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); calorieGoal=btn.dataset.value; });
  });

  function getInputs(){
    const age=Number(document.getElementById('age').value)||28;
    const activity=document.getElementById('activity').value;
    let weightKg, heightCm;
    if(unit==='metric'){ weightKg=Number(document.getElementById('weightKg').value)||75; heightCm=Number(document.getElementById('heightCm').value)||175; }
    else { weightKg=CONV.lbToKg(Number(document.getElementById('weightLb').value)||165); heightCm=CONV.ftInToCm(Number(document.getElementById('heightFt').value)||5, Number(document.getElementById('heightIn').value)||9); }
    return { age, activity, weightKg, heightCm, gender };
  }
  function chip(label, value){ return `<div class="result-chip"><b>${value}</b><span>${label}</span></div>`; }

  document.getElementById('calcForm').addEventListener('submit', function(e){
    e.preventDefault();
    const inp = getInputs();
    const box = document.getElementById('calcResult');
    let html = '';
    if(activeCalc==='bmi'){
      const bmi = calcBMI(inp.weightKg, inp.heightCm);
      const cat = bmiCategory(bmi);
      html = `<div class="result-main"><div class="result-detail"><div class="headline">Body Mass Index</div>
        <b style="font-family:var(--font-data);font-size:28px;">${round1(bmi)}</b>
        <div style="color:${cat.color};font-weight:600;font-size:14px;margin-top:4px;">${cat.label}</div></div></div>
        <div class="result-grid">${chip('Underweight','< 18.5')}${chip('Healthy','18.5–24.9')}${chip('Overweight','25–29.9')}${chip('Obesity','30+')}</div>
        <p class="disclaimer-note">BMI does not account for muscle mass or body composition.</p>`;
    } else if(activeCalc==='bmr'){
      const bmr = calcBMR({gender:inp.gender, weightKg:inp.weightKg, heightCm:inp.heightCm, age:inp.age});
      html = `<div class="result-main"><div class="result-detail"><div class="headline">Basal Metabolic Rate (Mifflin-St Jeor)</div>
        <b style="font-family:var(--font-data);font-size:28px;">${round0(bmr)} kcal/day</b>
        <div style="font-size:13px;color:var(--ink-soft);">Calories burned at complete rest</div></div></div>`;
    } else if(activeCalc==='tdee'){
      const bmr = calcBMR({gender:inp.gender, weightKg:inp.weightKg, heightCm:inp.heightCm, age:inp.age});
      const tdee = calcTDEE(bmr, inp.activity);
      html = `<div class="result-main"><div class="result-detail"><div class="headline">Total Daily Energy Expenditure</div>
        <b style="font-family:var(--font-data);font-size:28px;">${round0(tdee)} kcal/day</b></div></div>
        <div class="result-grid">${chip('BMR', round0(bmr)+' kcal')}${chip('Activity factor', ACTIVITY_FACTORS[inp.activity])}</div>`;
    } else if(activeCalc==='lbm'){
      const lbm = calcLBM({gender:inp.gender, weightKg:inp.weightKg, heightCm:inp.heightCm});
      const fatMass = inp.weightKg - lbm;
      html = `<div class="result-main"><div class="result-detail"><div class="headline">Lean Body Mass (Boer Formula)</div>
        <b style="font-family:var(--font-data);font-size:28px;">${round1(lbm)} kg</b></div></div>
        <div class="result-grid">${chip('Est. fat mass', round1(fatMass)+' kg')}${chip('LBM %', round1(lbm/inp.weightKg*100)+'%')}</div>`;
    } else if(activeCalc==='ideal'){
      const ideal = calcIdealWeight({gender:inp.gender, heightCm:inp.heightCm});
      html = `<div class="result-main"><div class="result-detail"><div class="headline">Ideal Body Weight (Devine Formula)</div>
        <b style="font-family:var(--font-data);font-size:28px;">${round1(ideal)} kg</b>
        <div style="font-size:13px;color:var(--ink-soft);">≈ ${round1(CONV.kgToLb(ideal))} lb</div></div></div>`;
    } else if(activeCalc==='water'){
      const liters = calcWater({weightKg:inp.weightKg, activity:inp.activity});
      html = `<div class="result-main"><div class="result-detail"><div class="headline">Daily Water Intake</div>
        <b style="font-family:var(--font-data);font-size:28px;">${round1(liters)} L</b>
        <div style="font-size:13px;color:var(--ink-soft);">≈ ${round0(liters*33.8)} fl oz</div></div></div>`;
    } else if(activeCalc==='calorie'){
      const bmr = calcBMR({gender:inp.gender, weightKg:inp.weightKg, heightCm:inp.heightCm, age:inp.age});
      const tdee = calcTDEE(bmr, inp.activity);
      const adj = calorieGoal==='lose' ? -500 : calorieGoal==='gain' ? 400 : 0;
      const target = tdee + adj;
      html = `<div class="result-main"><div class="result-detail"><div class="headline">Daily Calorie Target</div>
        <b style="font-family:var(--font-data);font-size:28px;">${round0(target)} kcal/day</b>
        <div style="font-size:13px;color:var(--ink-soft);">Maintenance TDEE: ${round0(tdee)} kcal</div></div></div>`;
    }
    box.innerHTML = html;
    box.classList.add('show');
  });
});
</script>
</body>
